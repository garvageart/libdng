build:
  stage: test
  image: alpine:edge
  before_script:
    - apk add --no-cache build-base meson samurai tiff-dev linux-headers scdoc
  script:
    - meson build --buildtype release --werror
    - ninja -C build
    - cd build && meson test --no-rebuild || cat meson-logs/testlog.txt

docs:
  stage: test
  image: alpine:edge
  before_script:
    - apk add --no-cache python3 py3-sphinx make
  script:
    - cd docs
    - make html

pages:
  stage: deploy
  image: alpine:edge
  before_script:
    - apk add --no-cache python3 py3-sphinx make
  script:
    - cd docs
    - make html
    - mv _build/html ../public
  artifacts:
    paths:
      - public
  environment: production
  rules:
    - if: $CI_COMMIT_BRANCH == "master"